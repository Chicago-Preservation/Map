var boundariesLayer = L.geoJSON(null, {
  options: { name: "Boundaries" },
 
 style: function (feature) {
    return {
      color: "#000000",  // Boundary color
      weight: 2,         // Boundary thickness
      fillOpacity: 0     // No fill
    };
  },

  onEachFeature: function (feature, layer) {
    var center = layer.getBounds().getCenter();
    var communityName = feature.properties.community || 'Unknown';

    // Create label but do NOT add it to the map yet
    var labelMarker = L.marker(center, {
      icon: L.divIcon({
        className: 'community-label',
        html: '<div style="font-size: 10px; font-weight: bold; text-align: center;">' + communityName + '</div>',
        iconSize: [80, 15] // Keep label small
      })
    });

    // Function to show/hide labels based on zoom level
    function toggleLabels() {
      if (map.getZoom() >= 14) { // Show labels at zoom level 14 or higher
        if (!map.hasLayer(labelMarker)) {
          map.addLayer(labelMarker);
        }
      } else {
        if (map.hasLayer(labelMarker)) {
          map.removeLayer(labelMarker);
        }
      }
    }

    // Run function when zoom changes
    map.on('zoomend', toggleLabels);

    // Run function once on page load to set initial visibility
    toggleLabels();
  }
});

// ── Shared popup builder for all NR layers ───────────────────────────────────
function buildNRPopup(props) {
  var name      = props.name     || props.nr_name   || props.NAME        || props.SignificantName || null;
  var address   = props.address  || props.ADDRESS   || props.Location    || null;
  var arch      = props.gabi_architect || props.Architect || props.architect || null;
  var yearBuilt = props.gabi_begin_year || props.year_built || props.BeginYear || null;
  var category  = props.category || props.SurveyType || null;
  var imgUrl    = props.gabi_img_url  || props.Url_img  || props.img_url  || null;
  var naraUrl   = props.external_link || null;
  var pdfUrl    = props.gabi_url      || props.URL      || props.report_url || null;
  // Don't show the same URL twice
  if (pdfUrl === naraUrl) pdfUrl = null;

  var html = '';
  if (name)      html += '<strong>' + name + '</strong><br>';
  if (address)   html += '<em>Address:</em> '     + address   + '<br>';
  if (yearBuilt) html += '<em>Date Built:</em> '  + yearBuilt + '<br>';
  if (arch)      html += '<em>Architect:</em> '   + arch      + '<br>';

  // Report links — no heading, just listed
  if (naraUrl && naraUrl.trim()) html += '<a href="' + naraUrl + '" target="_blank" style="color:#0073e6;text-decoration:underline;">NPS/NARA Record</a><br>';
  if (pdfUrl  && pdfUrl.trim())  html += '<a href="' + pdfUrl  + '" target="_blank" style="color:#0073e6;text-decoration:underline;">PDF Report</a><br>';

  // Image — no heading, just thumbnail
  if (imgUrl && imgUrl.trim()) {
    html += '<a href="' + imgUrl + '" target="_blank">' +
            '<img src="' + imgUrl + '" style="width:200px;height:auto;margin-top:5px;" ' +
            'onerror="this.style.display=\'none\'">' +
            '</a>';
  }
  return html || '<em>No details available</em>';
}

// ── Preservation Chicago Most Endangered ─────────────────────────────────────
function getMostEndangeredColor(status) {
  if (!status) return '#FF6B35';  // Endangered / Unknown — orange
  var s = status.toLowerCase();
  if (s.includes('demolish'))         return '#555555';  // Demolished — dark gray
  if (s.includes('landmark') || s.includes('pending')) return '#4169E1'; // Landmarked — royal blue
  return '#FF6B35';  // Endangered / no status — orange
}

var mostEndangeredLayer = L.geoJSON(null, {
  options: { name: "Preservation Chicago Most Endangered" },
  onEachFeature: function (feature, layer) {
    var p = feature.properties;
    var html = '';

    if (p.name)              html += '<strong>' + p.name + '</strong><br>';
    if (p.other_name)        html += '<em>Also Known As:</em> ' + p.other_name + '<br>';
    if (p.address)           html += '<em>Address:</em> ' + p.address + '<br>';
    if (p.year_built)        html += '<em>Year Built:</em> ' + p.year_built + '<br>';
    if (p.architect)         html += '<em>Architect:</em> ' + p.architect + '<br>';
    if (p.current_function)  html += '<em>Current Function:</em> ' + p.current_function + '<br>';
    if (p.historic_function) html += '<em>Historic Function:</em> ' + p.historic_function + '<br>';
    if (p.status)            html += '<em>Status:</em> ' + p.status + '<br>';
    if (p.article_url)       html += '<em>Link to Documentation:</em> <a href="' + p.article_url + '" target="_blank" style="color:#0073e6;text-decoration:underline;">Open Document</a><br>';
    if (p.img_url) {

      html += '<a href="' + p.img_url + '" target="_blank">' +

              'onerror="this.style.display=\'none\'">' +

    layer.bindPopup(html || '<em>No details available</em>');

  pointToLayer: function (feature, latlng) {

      radius: 6,

function getLostChicagoColor(type) {
  var colors = {
    'Entertainment':    '#e63946',
    'Industrial':       '#6d6875',
    'Hospitality':      '#f4a261',
    'Commercial':       '#e9c46a',
    'Transportation':   '#457b9d',
    'Public Housing':   '#2a9d8f',
    'Civic Center':     '#264653',
    'Mixed-Use':        '#a8dadc',
    'Religious':        '#c77dff',
    'School':           '#80b918',
    'Healthcare':       '#ff6b9d',
    'Military':         '#6c757d',
    'Private Residence':'#bc6c25',
    'Recreational Area':'#52b788',
    'Residential':      '#bc6c25',
  };
  return colors[type] || '#888888';
}

    if (p.year_demolished)  html += '<em>Year Demolished:</em> ' + p.year_demolished + '<br>';

              '<img src="' + p.img_link + '" style="width:200px;height:auto;margin:4px 0;" ' +

onEachFeature: function (feature, layer) {
  var props = feature.properties;
  
  // Remove commas and convert to number
  function toNum(value) {
    if (!value) return 0;
    return parseFloat((value + '').replace(/,/g, '')) || 0;
  }
  
  var total = toNum(props["Total Population"]);
  
  function getPct(value) {
    var num = toNum(value);
    if (num === 0 || total === 0) return '0%';
    return ((num / total) * 100).toFixed(0) + '%';
  }
  
  var popupContent = '<strong>' + (props.community || 'Community Area') + '</strong><br>' +
    '<em>Total Population:</em> ' + (props["Total Population"] || 'N/A') + '<br>' +

    '<em>Black or African American:</em> ' + getPct(props["Black or African American"]) + '<br>' +
    '<em>American Indian or Alaska Native:</em> ' + getPct(props["American Indian or Alaska Native"]) + '<br>' +
    '<em>Asian:</em> ' + getPct(props["Asian"]) + '<br>' +
    '<em>Native Hawaiian or Pacific Islander:</em> ' + getPct(props["Native Hawaiian or Pacific Islander"]) + '<br>' +
    '<em>Other Race:</em> ' + getPct(props["Other Race"]) + '<br>' +
    '<em>Multiracial:</em> ' + getPct(props["Multiracial"]) + '<br>' +
    '<em>Hispanic or Latino:</em> ' + getPct(props["Hispanic or Latino"]);
  
  layer.bindPopup(popupContent);
}

  // Financial Data Layer
var financialDataLayer = L.geoJSON(null, {
  options: { name: "Financial Data" },
  
  style: function (feature) {
    var medianIncome = feature.properties.MEDINC;
    var color;
    
    // Check for N/A, null, undefined, or non-numeric values first
    if (medianIncome === 'N/A' || medianIncome === '$N/A' || 
        medianIncome === null || medianIncome === undefined || 
        isNaN(medianIncome) || medianIncome === '') {
        // Don't fill areas with no data - make them transparent
        return {
            color: '#808080',      // Light gray border
            fillColor: 'transparent',  // No fill
            weight: 1,
            fillOpacity: 0,
            opacity: 0.3
        };
    }
    
    // Color by median income for valid values
    if (medianIncome >= 100000) {
        color = '#006400';      // Dark green - high income
    } else if (medianIncome >= 75000) {
        color = '#32CD32';      // Lime green
    } else if (medianIncome >= 50000) {
        color = '#FFD700';      // Gold - middle income
    } else if (medianIncome >= 25000) {
        color = '#FF8C00';      // Orange
    } else {
        color = '#DC143C';      // Crimson - low income
    }
    
    return {
        color: color,
        fillColor: color,
        weight: 2,
        fillOpacity: 0.6,
        opacity: 0.8
    };
},
  
  onEachFeature: function (feature, layer) {
    var props = feature.properties;
    var popupContent = '<strong>' + (props.community || 'Community Area') + '</strong><br>' +

            if (subOption.layer === mostEndangeredLayer) {
                var legendDiv = document.querySelector('.most-endangered-legend');
                if (legendDiv) legendDiv.style.display = 'none';
            }
        }
    }
};
                
                map.on('overlayadd', (e) => {
                    if(e.layer === subOption.layer) checkbox.checked = true;
                });
                map.on('overlayremove', (e) => {
                    if(e.layer === subOption.layer) checkbox.checked = false;
                });

                const label = document.createElement('label');
                label.style.display = 'flex';
                label.style.alignItems = 'center';
                label.style.fontSize = '14px';
                label.appendChild(checkbox);
                
                const nameSpan = document.createElement('span');
                nameSpan.innerHTML = subOption.name;
                label.appendChild(nameSpan);

                item.appendChild(label);
            });

            header.onclick = function() {
                const isHidden = subOptionsContainer.style.display === 'none';
                subOptionsContainer.style.display = isHidden ? 'block' : 'none';
                header.innerHTML = isHidden ? `▼ ${categoryObj.category}` : `► ${categoryObj.category}`;
            };
        });

        return container;
    }

      // 3. This creates the new legend and adds it to the map.
      const newLegendControl = L.control({position: 'bottomright'});
      newLegendControl.onAdd = function(map) {
          return buildHierarchicalLegend(legendData);
      };
      newLegendControl.addTo(map);

      // --- END OF NEW HIERARCHICAL LEGEND CODE ---

if (window.innerWidth <= 768) {
  const leftContainer = document.querySelector('.leaflet-bottom.leaflet-left');

  if (panel && leftContainer && !leftContainer.contains(panel)) {

setTimeout(() => {
    if (!panel) return;

    // Style the panel
    panel.style.maxWidth = '45vw';

    panel.style.padding = '10px';
    panel.style.boxShadow = '0 2px 8px rgba(0,0,0,0.3)';

    // Add toggle button
    const toggleBtn = document.createElement('button');
    toggleBtn.id = 'toggle-panel-btn';
    toggleBtn.className = 'toggle-panel-btn';
    toggleBtn.innerText = 'Map Layers ⌄';

    const mapContainer = document.getElementById('map');
    if (mapContainer) mapContainer.appendChild(toggleBtn);

    toggleBtn.addEventListener('click', () => {
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    });
  }, 300);
}
     return items;
